name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: release-please
    # Root compiler releases: tags like v0.0.12. @forst/cli uses cli-v*, @forst/sidecar uses sidecar-v* (see .release-please-config.json).
    if: ${{ needs.release-please.outputs.release_created && startsWith(needs.release-please.outputs.tag_name, 'v') }}
    runs-on: ubuntu-latest
    env:
      GIT_TAG: ${{ needs.release-please.outputs.tag_name }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          check-latest: true

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        # Resolves version from root package.json "packageManager" (e.g. bun@1.3.11)

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            */node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Build binaries
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ needs.release-please.outputs.tag_name }}
        run: |
          # Extract version info from tag
          VERSION=${RELEASE_VERSION#v}
          COMMIT=$(git rev-parse HEAD)
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "Building version: $VERSION"
          echo "Commit: $COMMIT"
          echo "Date: $DATE"

          # Build binaries for multiple platforms with version info
          task build:release VERSION=$VERSION COMMIT=$COMMIT DATE=$DATE

          # dist/: cross-platform forst binaries/archives + forst-vscode-<VERSION>.vsix
          ls -la dist/

      - name: Upload binary to GitHub Release
        run: |
          gh release upload $GIT_TAG ./dist/*

      # Self-publish to Open VSX (same .vsix as GitHub Release)
      - name: Set up Node.js (Open VSX publish)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Publish VS Code extension to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -z "$OVSX_PAT" ]; then
            echo "OVSX_PAT secret not set; skipping Open VSX publish."
            echo "Create a token at https://open-vsx.org and add OVSX_PAT to this repository's Actions secrets."
            exit 0
          fi
          set -e
          npx --yes ovsx publish dist/forst-vscode-*.vsix
