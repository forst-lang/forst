name: Release

on:
  push:
    branches: [main]
  # Manual: Actions → Release → Run workflow (Release Please + publish jobs when tags are produced).
  workflow_dispatch:
    inputs:
      npm_publish_verbose:
        description: "Pass --verbose to npm publish (publish-packages workflow)"
        type: boolean
        default: true

# Publish runs via workflow_call here because GITHUB_TOKEN releases do not trigger `on: release`.
permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      paths_released: ${{ steps.release.outputs.paths_released }}
      # Re-export via a shell step so job outputs get plain names (job-level mapping of
      # steps.release.outputs['packages/…--tag_name'] can end up empty on some runners).
      sidecar_tag_name: ${{ steps.pkg_tags.outputs.sidecar_tag_name }}
      cli_tag_name: ${{ steps.pkg_tags.outputs.cli_tag_name }}
      vscode_tag_name: ${{ steps.pkg_tags.outputs.vscode_tag_name }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Export monorepo package tags for job outputs
        id: pkg_tags
        run: |
          echo "cli_tag_name=${{ steps.release.outputs['packages/cli--tag_name'] }}" >> "$GITHUB_OUTPUT"
          echo "sidecar_tag_name=${{ steps.release.outputs['packages/sidecar--tag_name'] }}" >> "$GITHUB_OUTPUT"
          echo "vscode_tag_name=${{ steps.release.outputs['packages/vscode-forst--tag_name'] }}" >> "$GITHUB_OUTPUT"

  # Go compiler binaries: only when the root package (`.`) is in this release — not vscode/cli/sidecar-only tags.
  # `startsWith(tag_name, 'v')` is wrong here (`vscode-forst-v…` also starts with `v`).
  build:
    needs: release-please
    if: ${{ contains(fromJSON(needs.release-please.outputs.paths_released || '[]'), '.') }}
    runs-on: ubuntu-latest
    env:
      GIT_TAG: ${{ needs.release-please.outputs.tag_name }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true

      - uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build binaries
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ needs.release-please.outputs.tag_name }}
        run: |
          VERSION=${RELEASE_VERSION#v}
          COMMIT=$(git rev-parse HEAD)
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          task build:release VERSION=$VERSION COMMIT=$COMMIT DATE=$DATE
          ls -la dist/

      - name: Upload binary to GitHub Release
        run: gh release upload $GIT_TAG ./dist/*

  docker:
    needs: [release-please, build]
    if: ${{ contains(fromJSON(needs.release-please.outputs.paths_released || '[]'), '.') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      GIT_TAG: ${{ needs.release-please.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Release metadata for image build
        id: release_meta
        run: |
          set -euo pipefail
          VERSION="${GIT_TAG#v}"
          COMMIT=$(git rev-parse HEAD)
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "commit=${COMMIT}" >> "$GITHUB_OUTPUT"
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push default image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: default
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: true
          build-args: |
            VERSION=${{ steps.release_meta.outputs.version }}
            COMMIT=${{ steps.release_meta.outputs.commit }}
            DATE=${{ steps.release_meta.outputs.date }}
          tags: |
            ghcr.io/forst-lang/forst:${{ env.GIT_TAG }}
            ghcr.io/forst-lang/forst:latest

      - name: Build and push minimal image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: minimal
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: true
          build-args: |
            VERSION=${{ steps.release_meta.outputs.version }}
            COMMIT=${{ steps.release_meta.outputs.commit }}
            DATE=${{ steps.release_meta.outputs.date }}
          tags: |
            ghcr.io/forst-lang/forst-minimal:${{ env.GIT_TAG }}
            ghcr.io/forst-lang/forst-minimal:latest

  publish-packages:
    needs: release-please
    # Prefer non-empty tags over *_release_created == 'true' (output quirks between runs).
    if: ${{ needs.release-please.outputs.sidecar_tag_name != '' || needs.release-please.outputs.cli_tag_name != '' }}
    uses: ./.github/workflows/publish-packages.yml
    with:
      sidecar_tag: ${{ needs.release-please.outputs.sidecar_tag_name }}
      cli_tag: ${{ needs.release-please.outputs.cli_tag_name }}
      # Push to main: verbose npm (true). Manual run: use checkbox (default true).
      npm_publish_verbose: ${{ github.event_name != 'workflow_dispatch' || inputs.npm_publish_verbose }}
    secrets: inherit

  publish-vscode-extension:
    needs: release-please
    if: ${{ needs.release-please.outputs.vscode_tag_name != '' }}
    uses: ./.github/workflows/publish-vscode-extension.yml
    with:
      tag_name: ${{ needs.release-please.outputs.vscode_tag_name }}
    secrets: inherit
