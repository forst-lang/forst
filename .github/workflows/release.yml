name: Release

on:
  push:
    branches: [main]

# npm / JSR / VSIX publish runs in this workflow via workflow_call after Release Please creates a tag.
# Releases created with the default GITHUB_TOKEN do not emit `release` events, so separate
# `on: release` workflows would not run for Release Please–created releases.

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: release-please
    # Root compiler releases: tags like v0.0.12. VS Code extension ships on vscode-forst-v* (see publish-vscode-extension.yml).
    if: ${{ needs.release-please.outputs.release_created && startsWith(needs.release-please.outputs.tag_name, 'v') }}
    runs-on: ubuntu-latest
    env:
      GIT_TAG: ${{ needs.release-please.outputs.tag_name }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          check-latest: true

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build binaries
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ needs.release-please.outputs.tag_name }}
        run: |
          # Extract version info from tag
          VERSION=${RELEASE_VERSION#v}
          COMMIT=$(git rev-parse HEAD)
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "Building version: $VERSION"
          echo "Commit: $COMMIT"
          echo "Date: $DATE"

          # Build binaries for multiple platforms with version info
          task build:release VERSION=$VERSION COMMIT=$COMMIT DATE=$DATE

          # dist/: cross-platform forst binaries/archives (no .vsix here; extension uses vscode-forst-v* releases)
          ls -la dist/

      - name: Upload binary to GitHub Release
        run: |
          gh release upload $GIT_TAG ./dist/*

  publish-packages:
    name: Trigger npm / JSR publish
    needs: release-please
    if: >-
      ${{
        needs.release-please.outputs.release_created &&
        (startsWith(needs.release-please.outputs.tag_name, 'sidecar-') ||
         startsWith(needs.release-please.outputs.tag_name, 'cli-'))
      }}
    uses: ./.github/workflows/publish-packages.yml
    with:
      tag_name: ${{ needs.release-please.outputs.tag_name }}
    secrets: inherit

  publish-vscode-extension:
    name: Trigger VS Code extension publish
    needs: release-please
    if: >-
      ${{
        needs.release-please.outputs.release_created &&
        startsWith(needs.release-please.outputs.tag_name, 'vscode-forst-')
      }}
    uses: ./.github/workflows/publish-vscode-extension.yml
    with:
      tag_name: ${{ needs.release-please.outputs.tag_name }}
    secrets: inherit
