name: Run tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality-checks:
    name: Lint, test, and coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Go modules
        uses: actions/cache@v6
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('forst/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install Go dependencies
        working-directory: forst
        run: go mod download

      - name: Build compiler
        working-directory: forst
        run: task build

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        # Resolves version from root package.json "packageManager" (e.g. bun@1.3.11)

      - name: Cache Bun dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            */node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Bun dependencies
        run: bun install

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"

      - name: Echo package versions (smoke)
        run: |
          echo "sidecar=$(node -p "require('./packages/sidecar/package.json').version") vscode-forst=$(node -p "require('./packages/vscode-forst/package.json').version")"

      - name: Run linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m
          working-directory: forst
        continue-on-error: true

      - name: Run tests with coverage
        working-directory: forst
        run: task ci:test

      - name: Upload coverage to Coveralls
        uses: shogo82148/actions-goveralls@v1
        with:
          path-to-profile: profile.cov
          working-directory: forst

  docker-smoke:
    name: Docker image smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v3

      - name: Build default image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: default
          load: true
          tags: forst-smoke:default
          build-args: |
            VERSION=dev
            COMMIT=ci-smoke
            DATE=2026-01-01T00:00:00Z

      - name: Run forst version
        run: docker run --rm forst-smoke:default version

      - name: Run forst run via default image
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}/examples/in:/workspace" \
            -w /workspace \
            forst-smoke:default run basic.ft

      - name: Build minimal image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: minimal
          load: true
          tags: forst-smoke:minimal
          build-args: |
            VERSION=dev
            COMMIT=ci-smoke
            DATE=2026-01-01T00:00:00Z

      - name: Run forst version on minimal image
        run: docker run --rm forst-smoke:minimal version
