name: Run tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality-checks:
    name: Lint, test, and coverage
    runs-on: ubuntu-latest

    steps:
      - uses: ./.github/actions/ci-go-bun-setup
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build compiler
        working-directory: forst
        run: task build

      - name: Echo package versions (smoke)
        run: |
          echo "sidecar=$(node -p "require('./packages/sidecar/package.json').version") vscode-forst=$(node -p "require('./packages/vscode-forst/package.json').version")"

      - name: Run linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m
          working-directory: forst
        continue-on-error: true

      - name: Run tests with coverage
        working-directory: forst
        run: task ci:test

      - name: Upload coverage to Coveralls
        uses: shogo82148/actions-goveralls@v1
        with:
          path-to-profile: profile.cov
          working-directory: forst

  remix-serve-standalone-e2e:
    name: Remix-serve standalone E2E
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/ci-go-bun-setup
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run standalone remix-serve E2E
        run: task example:node-interop-remix-serve:standalone-e2e

  docker-smoke:
    name: Docker image smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v3

      - name: Build default image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: default
          load: true
          tags: forst-smoke:default
          build-args: |
            VERSION=dev
            COMMIT=ci-smoke
            DATE=2026-01-01T00:00:00Z

      - name: Run forst version
        run: docker run --rm forst-smoke:default version

      - name: Run forst run via default image
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}/examples/in:/workspace" \
            -w /workspace \
            forst-smoke:default run basic.ft

      - name: Build minimal image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: minimal
          load: true
          tags: forst-smoke:minimal
          build-args: |
            VERSION=dev
            COMMIT=ci-smoke
            DATE=2026-01-01T00:00:00Z

      - name: Run forst version on minimal image
        run: docker run --rm forst-smoke:minimal version
