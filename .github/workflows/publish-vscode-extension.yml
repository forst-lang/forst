# Build the VSIX, attach it to the GitHub Release, publish to the VS Code Marketplace,
# and publish to Open VSX.
#
# VSIX packaging uses `task build:vsix`: rewrites @forst/cli to a published semver, installs it from npm,
# then restores package.json / bun.lockb (committed trees stay workspace:* for dev/CI).
#
# Invoked from release.yml via workflow_call after Release Please creates a tag, or run manually:
# Actions → "Publish VS Code extension" → Run workflow (enter the release tag).
# (GitHub does not fire `release` workflows for releases created with GITHUB_TOKEN.)
#
# Tag prefix: `vscode-forst-` (packages/vscode-forst in .release-please-config.json).
#
# Secrets (publish steps are skipped when unset):
# - VSCE_PAT: Azure DevOps PAT with Marketplace → Manage scope for publisher forst
# - OVSX_PAT: Open VSX publish token for publisher forst

name: Publish VS Code extension

on:
  workflow_call:
    inputs:
      tag_name:
        description: "Release tag (e.g. vscode-forst-v0.1.0)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (e.g. vscode-forst-v0.1.0); must exist on the default branch"
        required: true
        type: string

jobs:
  vsix-and-publish:
    name: VSIX + Marketplace + Open VSX
    runs-on: ubuntu-latest
    if: startsWith(inputs.tag_name, 'vscode-forst-')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag_name }}

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Package .vsix and upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ inputs.tag_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG_NAME#vscode-forst-v}"
          echo "Extension semver: $VERSION"
          task build:vsix VERSION="$VERSION"
          gh release upload "$TAG_NAME" dist/forst-vscode-*.vsix

      - uses: actions/setup-node@v6
        with:
          node-version: "24.x"

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "${VSCE_PAT}" ]; then
            echo "VSCE_PAT secret not set; skipping VS Code Marketplace publish."
            echo "Create a PAT at https://dev.azure.com with Marketplace → Manage scope for publisher forst."
            exit 0
          fi
          set -euo pipefail
          VSIX=$(ls dist/forst-vscode-*.vsix | head -1)
          test -f "${VSIX}"
          npx --yes @vscode/vsce publish --packagePath "${VSIX}"

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -z "${OVSX_PAT}" ]; then
            echo "OVSX_PAT secret not set; skipping Open VSX publish."
            echo "Create a token at https://open-vsx.org and add OVSX_PAT to this repository's Actions secrets."
            exit 0
          fi
          set -e
          npx --yes ovsx publish dist/forst-vscode-*.vsix
