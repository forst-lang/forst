# Build the VSIX, attach it to the GitHub Release, and publish to Open VSX.
#
# Invoked from release.yml via workflow_call after Release Please creates a tag.
# (GitHub does not fire `release` workflows for releases created with GITHUB_TOKEN.)
#
# Tag prefix: `vscode-forst-` (packages/vscode-forst in .release-please-config.json).
#
# Secrets:
# - OVSX_PAT: Open VSX publish token (optional; step skipped if unset).

name: Publish VS Code extension

on:
  workflow_call:
    inputs:
      tag_name:
        description: "Release tag (e.g. vscode-forst-v0.1.0)"
        required: true
        type: string

jobs:
  vsix-and-open-vsx:
    name: VSIX + Open VSX
    runs-on: ubuntu-latest
    if: startsWith(inputs.tag_name, 'vscode-forst-')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name }}

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Point dependencies @forst/cli at published semver (not workspace:*)
        run: node packages/sidecar/scripts/rewrite-cli-workspace-dep-for-publish.mjs packages/vscode-forst/package.json

      # package.json changed; lockfile no longer matches — cannot use --frozen-lockfile here
      - name: Install deps after @forst/cli rewrite (non-frozen)
        run: bun install

      - uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Package .vsix and upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ inputs.tag_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG_NAME#vscode-forst-v}"
          echo "Extension semver: $VERSION"
          task build:vsix VERSION="$VERSION"
          gh release upload "$TAG_NAME" dist/forst-vscode-*.vsix

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -z "${OVSX_PAT}" ]; then
            echo "OVSX_PAT secret not set; skipping Open VSX publish."
            echo "Create a token at https://open-vsx.org and add OVSX_PAT to this repository's Actions secrets."
            exit 0
          fi
          set -e
          npx --yes ovsx publish dist/forst-vscode-*.vsix
