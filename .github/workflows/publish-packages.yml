# Publish @forst/sidecar (npm + JSR) and @forst/cli (npm + JSR).
#
# Invoked from release.yml via workflow_call after Release Please creates a tag.
# (GitHub does not fire `release` workflows for releases created with GITHUB_TOKEN,
# so we cannot rely on `on: release` alone.)
#
# Tag prefixes (.release-please-config.json):
# - packages/sidecar → `sidecar-`
# - packages/cli → `cli-`
#
# Secrets:
# - NPM_TOKEN: publish @forst/sidecar and @forst/cli to npm.
# - JSR: link jsr.io packages to this repo for OIDC, or set JSR_TOKEN.

name: Publish packages (npm / JSR)

on:
  workflow_call:
    inputs:
      tag_name:
        description: "Release tag (e.g. sidecar-v0.1.0, cli-v0.0.19)"
        required: true
        type: string

jobs:
  sidecar-npm:
    name: "@forst/sidecar → npm"
    runs-on: ubuntu-latest
    if: startsWith(inputs.tag_name, 'sidecar-')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name }}

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - uses: actions/setup-node@v4
        with:
          registry-url: "https://registry.npmjs.org"
          node-version: "20"

      - name: Publish package to NPM
        working-directory: packages/sidecar
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

  sidecar-jsr:
    name: "@forst/sidecar → JSR"
    runs-on: ubuntu-latest
    if: startsWith(inputs.tag_name, 'sidecar-')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name }}

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - uses: ./.github/actions/jsr-publish-package
        with:
          working-directory: packages/sidecar
          jsr-token: ${{ secrets.JSR_TOKEN }}

  cli-npm:
    name: "@forst/cli → npm"
    runs-on: ubuntu-latest
    if: startsWith(inputs.tag_name, 'cli-')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name }}

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - uses: actions/setup-node@v4
        with:
          registry-url: "https://registry.npmjs.org"
          node-version: "20"

      - name: Publish package to NPM
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

  cli-jsr:
    name: "@forst/cli → JSR"
    runs-on: ubuntu-latest
    if: startsWith(inputs.tag_name, 'cli-')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name }}

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - uses: ./.github/actions/jsr-publish-package
        with:
          working-directory: packages/cli
          jsr-token: ${{ secrets.JSR_TOKEN }}
