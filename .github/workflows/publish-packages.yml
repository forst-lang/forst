# Publish @forst/sidecar and @forst/cli (npm + JSR). Called from release.yml via workflow_call.
# Inputs: pass the tag for each package that released (omit or leave empty for the other).

name: Publish packages (npm / JSR)

on:
  workflow_call:
    inputs:
      sidecar_tag:
        description: "Git tag for sidecar (e.g. sidecar-v0.1.0)"
        required: false
        type: string
        default: ""
      cli_tag:
        description: "Git tag for cli (e.g. cli-v0.0.19)"
        required: false
        type: string
        default: ""

jobs:
  sidecar-npm:
    name: "@forst/sidecar → npm"
    runs-on: ubuntu-latest
    if: inputs.sidecar_tag != ''
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sidecar_tag }}

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - uses: actions/setup-node@v4
        with:
          registry-url: "https://registry.npmjs.org"
          node-version: "20"

      - name: Publish package to NPM
        working-directory: packages/sidecar
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

  sidecar-jsr:
    name: "@forst/sidecar → JSR"
    runs-on: ubuntu-latest
    if: inputs.sidecar_tag != ''
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sidecar_tag }}

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - uses: ./.github/actions/jsr-publish-package
        with:
          working-directory: packages/sidecar
          jsr-token: ${{ secrets.JSR_TOKEN }}

  cli-npm:
    name: "@forst/cli → npm"
    runs-on: ubuntu-latest
    if: inputs.cli_tag != ''
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.cli_tag }}

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - uses: actions/setup-node@v4
        with:
          registry-url: "https://registry.npmjs.org"
          node-version: "20"

      - name: Publish package to NPM
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

  cli-jsr:
    name: "@forst/cli → JSR"
    runs-on: ubuntu-latest
    if: inputs.cli_tag != ''
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.cli_tag }}

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - uses: ./.github/actions/jsr-publish-package
        with:
          working-directory: packages/cli
          jsr-token: ${{ secrets.JSR_TOKEN }}
