# Publish @forst/sidecar and @forst/cli (npm + JSR). Called from release.yml via workflow_call.
# Inputs: pass the tag for each package that released (omit or leave empty for the other).
#
# Sidecar jobs depend on the matching CLI jobs when both run: sidecar declares `@forst/cli@^…` and
# JSR resolves that package from jsr.io (npm publish order matters for npm installability).

name: Publish packages (npm / JSR)

on:
  workflow_call:
    inputs:
      sidecar_tag:
        description: "Git tag for sidecar (e.g. sidecar-v0.1.0)"
        required: false
        type: string
        default: ""
      cli_tag:
        description: "Git tag for cli (e.g. cli-v0.0.19)"
        required: false
        type: string
        default: ""

jobs:
  cli-npm:
    name: "@forst/cli → npm"
    runs-on: ubuntu-latest
    # https://docs.github.com/en/actions/tutorials/publish-packages/publish-nodejs-packages
    permissions:
      contents: read
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    if: inputs.cli_tag != ''
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.cli_tag }}

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - uses: actions/setup-node@v4
        with:
          # Trailing slash matters for how setup-node wires auth to npm (same as GitHub’s publish tutorial).
          registry-url: "https://registry.npmjs.org/"
          node-version: "20"

      # npm validates `bin` paths before lifecycle scripts; build once so `dist/bin.js` exists (prepublishOnly still runs for JSR sync + fresh build).
      - name: Build @forst/cli
        working-directory: packages/cli
        run: bun run build

      # E404 on PUT …/@forst%2fcli is almost always missing publish rights on the @forst scope (not a bad
      # tarball). Fix: add the npm user for this token to https://www.npmjs.com/org/forst with publish
      # access, or use a granular access token with Publish for @forst/cli (prefer an Automation token).
      - name: Confirm npm user (debug 404 on publish)
        run: npm whoami

      # Avoid workspace-aware publish (monorepo root): can make npm resolve sibling packages from the
      # registry before the version being published exists. `--workspaces=false` publishes cwd only.
      - name: Publish package to NPM
        working-directory: packages/cli
        run: npm publish --access public --workspaces=false

  cli-jsr:
    name: "@forst/cli → JSR"
    runs-on: ubuntu-latest
    if: inputs.cli_tag != ''
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.cli_tag }}

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - uses: ./.github/actions/jsr-publish-package
        with:
          working-directory: packages/cli
          jsr-token: ${{ secrets.JSR_TOKEN }}

  sidecar-npm:
    name: "@forst/sidecar → npm"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    needs: [cli-npm]
    # GitHub skips dependents when a needed job is skipped unless `if` uses `always()`; without it,
    # sidecar-only releases never run (cli-npm is skipped).
    if: |
      always() && !cancelled() &&
      inputs.sidecar_tag != '' &&
      (needs.cli-npm.result == 'success' || needs.cli-npm.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sidecar_tag }}

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - uses: actions/setup-node@v4
        with:
          registry-url: "https://registry.npmjs.org/"
          node-version: "20"

      # `npm pack` does not run prepublishOnly; run the same pipeline as publish, then pack with
      # --ignore-scripts so the tarball matches what npm publish would upload (prepublishOnly runs again on publish).
      - name: Verify packed tarball has registry @forst/cli (not workspace:*)
        working-directory: packages/sidecar
        run: |
          set -euo pipefail
          bun run prepublish:sidecar
          OUT=$(npm pack --pack-destination "${RUNNER_TEMP}" --ignore-scripts | tail -1)
          if [[ "${OUT}" != /* ]]; then OUT="${RUNNER_TEMP}/${OUT}"; fi
          test -f "${OUT}"
          tar -xOf "${OUT}" package/package.json | jq -e \
            '.dependencies["@forst/cli"] | type == "string" and test("^\\^") and (test("^workspace:") | not)'
          git checkout -- package.json

      - name: Confirm npm user (debug 404 on publish)
        run: npm whoami

      - name: Publish package to NPM
        working-directory: packages/sidecar
        run: npm publish --access public --workspaces=false

  sidecar-jsr:
    name: "@forst/sidecar → JSR"
    runs-on: ubuntu-latest
    needs: [cli-jsr]
    if: |
      always() && !cancelled() &&
      inputs.sidecar_tag != '' &&
      (needs.cli-jsr.result == 'success' || needs.cli-jsr.result == 'skipped')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sidecar_tag }}

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      # `npx jsr publish` does not run npm's prepublishOnly; run the same pipeline as npm publish.
      - name: Build sidecar and rewrite @forst/cli for registry
        working-directory: packages/sidecar
        run: bun run prepublish:sidecar

      - uses: ./.github/actions/jsr-publish-package
        with:
          working-directory: packages/sidecar
          jsr-token: ${{ secrets.JSR_TOKEN }}
