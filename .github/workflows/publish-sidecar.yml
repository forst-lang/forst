# Publish @forst/sidecar to npmjs.com and jsr.io.
#
# Automatic: when Release Please creates a GitHub Release whose tag contains
# "sidecar-v" (see .release-please-config.json for packages/sidecar), this
# workflow checks out that tag and publishes the same version to npm and JSR.
#
# Manual: workflow_dispatch (publishes from the default branch; bump versions first).
#
# Secrets:
# - NPM_TOKEN: automation access token with publish to @forst/sidecar.
# - JSR: link https://jsr.io/@forst/sidecar to this repo for OIDC, or set JSR_TOKEN.

name: Publish @forst/sidecar

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish-npm:
    name: Publish to NPM
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'release' && contains(github.event.release.tag_name, 'sidecar-v'))
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - uses: actions/setup-node@v4
        with:
          registry-url: "https://registry.npmjs.org"
          node-version: "20"

      - name: Publish package to NPM
        working-directory: packages/sidecar
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

  publish-jsr:
    name: Publish to JSR
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'release' && contains(github.event.release.tag_name, 'sidecar-v'))
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Sync jsr.json version from package.json
        working-directory: packages/sidecar
        run: bun run sync-jsr-version

      - name: Publish package to JSR
        working-directory: packages/sidecar
        run: npx jsr publish
        env:
          JSR_TOKEN: ${{ secrets.JSR_TOKEN }}
