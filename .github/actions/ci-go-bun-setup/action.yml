name: CI Go Bun setup
description: Go, Task, caches, Bun, and Node setup shared by Forst CI jobs.
inputs:
  github-token:
    description: GitHub token for setup-task
    required: true
runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: "1.26"
        check-latest: true

    - name: Install Task
      uses: arduino/setup-task@v2
      with:
        repo-token: ${{ inputs.github-token }}

    - name: Cache Go modules
      uses: actions/cache@v6
      with:
        path: |
          ~/go/pkg/mod
          ~/.cache/go-build
        key: ${{ runner.os }}-go-${{ hashFiles('forst/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Install Go dependencies
      working-directory: forst
      run: go mod download
      shell: bash

    - name: Install Bun
      uses: oven-sh/setup-bun@v2
      # Resolves version from root package.json "packageManager" (e.g. bun@1.3.11)

    - name: Cache Bun dependencies
      uses: actions/cache@v6
      with:
        path: |
          ~/.bun/install/cache
          node_modules
          */node_modules
        key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
        restore-keys: |
          ${{ runner.os }}-bun-

    - name: Install Bun dependencies
      run: bun install
      shell: bash

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: "24.x"
