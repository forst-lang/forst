version: "2"

linters:
  exclusions:
    rules:
      # internal/{ast,parser,printer} intentionally reuse stdlib-like package names.
      - linters:
          - revive
        text: "avoid package names that conflict with Go standard library package names"
  enable:
    - errcheck
    - staticcheck
    - unused
    - ineffassign
    - govet
    - misspell
    - revive
  settings:
    revive:
      # Listing rules only disables specific checks; keep revive defaults otherwise.
      enable-default-rules: true
      rules:
        # Doc-comment style for every exported symbol is high churn; keep other revive checks.
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
