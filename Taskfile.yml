version: "3"

vars:
  BINARY_NAME: forst
  BUILD_DIR: cmd/forst
  ROOT_DIR: ..
  EXAMPLES_DIR: ../examples/in
  OUTPUT_DIR: ../examples/out

tasks:
  # Build tasks
  build:
    desc: Build the Forst compiler
    dir: forst
    cmds:
      - go build -o ../bin/{{.BINARY_NAME}} ./{{.BUILD_DIR}}
    sources:
      - ./**/*.go
    generates:
      - ../bin/{{.BINARY_NAME}}

  build:optimized:
    desc: Build stripped local binary with PGO (if default.pgo exists) and version ldflags
    dir: forst
    cmds:
      - mkdir -p ../bin
      - |
        set -euo pipefail
        PGO_FLAG=""
        if [ -f default.pgo ]; then PGO_FLAG="-pgo=default.pgo"; fi
        COMMIT=$(git rev-parse HEAD)
        DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
        LDFLAGS="-s -w -X main.Version=dev -X main.Commit=${COMMIT} -X main.Date=${DATE}"
        go build ${PGO_FLAG} -ldflags="${LDFLAGS}" -o ../bin/{{.BINARY_NAME}} ./{{.BUILD_DIR}}
      - ls -lh ../bin/{{.BINARY_NAME}}
      - ../bin/{{.BINARY_NAME}} version
    sources:
      - ./**/*.go
    generates:
      - ../bin/{{.BINARY_NAME}}

  build:cli:
    desc: Build @forst/cli
    dir: packages/cli
    deps: [install:bun]
    cmds:
      - bun run build
    sources:
      - ./**/*.ts
    generates:
      - packages/cli/dist/index.js
      - packages/cli/dist/index.d.ts

  test:cli:
    desc: Run Bun tests for @forst/cli
    dir: packages/cli
    deps: [install:bun]
    cmds:
      - bun run test

  build:sidecar:
    desc: Build the Forst sidecar
    dir: packages/sidecar
    deps: [install:bun, build:cli]
    cmds:
      - bun run build
    sources:
      - ./**/*.ts
    generates:
      - packages/sidecar/dist/index.js
      - packages/sidecar/dist/index.d.ts

  test:sidecar:
    desc: Run Bun tests for @forst/sidecar
    dir: packages/sidecar
    deps: [install:bun, build:cli]
    cmds:
      - bun run test

  build:node-runtime:
    desc: Build @forst/node-runtime
    dir: packages/node-runtime
    deps: [install:bun]
    cmds:
      - bun run build
    sources:
      - ./**/*.ts
    generates:
      - packages/node-runtime/dist/bootstrap.js
      - packages/node-runtime/dist/index.js

  test:node-runtime:
    desc: Run Bun tests for @forst/node-runtime
    dir: packages/node-runtime
    deps: [install:bun]
    cmds:
      - bun run test

  build:client:
    desc: Build the Forst client
    dir: packages/client
    deps: [install:bun]
    cmds:
      - bun run build
    sources:
      - ./**/*.ts
    generates:
      - packages/client/dist/index.js
      - packages/client/dist/index.d.ts

  build:vscode:
    desc: Compile the VS Code extension (TypeScript)
    dir: packages/vscode-forst
    deps: [install:bun, build:cli]
    cmds:
      - bun run compile
      - bun run test
    sources:
      - ./**/*.ts
      - syntaxes/**
      - test/**
    generates:
      - packages/vscode-forst/out/extension.js
      - packages/vscode-forst/out/extension.js.map

  sync:forst-grammar:
    desc: Sync forst.tmLanguage.json to docs/languages/forst.json (Mintlify)
    dir: packages/vscode-forst
    cmds:
      - bun run sync:grammar
    sources:
      - syntaxes/forst.tmLanguage.json
    generates:
      - docs/languages/forst.json

  install:
    desc: Install the Forst compiler
    dir: forst
    cmds:
      - go install ./{{.BUILD_DIR}}

  clean:
    desc: Clean build artifacts
    dir: forst
    cmds:
      - rm -rf ../bin/
      - go clean -cache

  # Test tasks
  test:
    desc: Run all tests
    dir: forst
    cmds:
      - go test -v ./internal/...
      - go test -v ./cmd/forst/...

  test:unit:
    desc: Run unit tests only
    dir: forst
    cmds:
      - go test -v ./internal/...

  test:unit:parser:
    desc: Run unit tests for parser
    dir: forst
    cmds:
      - go test -v ./internal/parser/...

  test:unit:typechecker:
    desc: Run unit tests for typechecker
    dir: forst
    cmds:
      - go test -v ./internal/typechecker/...

  test:unit:transformer:
    desc: Run unit tests for transformer
    dir: forst
    cmds:
      - go test -v ./internal/transformer/...

  test:unit:lexer:
    desc: Run unit tests for lexer
    dir: forst
    cmds:
      - go test -v ./internal/lexer/...

  test:unit:discovery:
    desc: Run unit tests for discovery
    dir: forst
    cmds:
      - go test -v ./internal/discovery/...

  test:unit:executor:
    desc: Run unit tests for executor
    dir: forst
    cmds:
      - go test -v ./internal/executor/...

  test:unit:ast:
    desc: Run unit tests for AST
    dir: forst
    cmds:
      - go test -v ./internal/ast/...

  test:integration:
    desc: Run integration tests (examples)
    dir: forst
    cmds:
      - go test -v ./cmd/forst/...

  test:coverage:
    desc: Run tests with coverage
    dir: forst
    cmds:
      - go test -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html
    generates:
      - coverage.out
      - coverage.html

  # Example compilation tasks
  #
  # Multi-file merged package + TypeScript (examples/in/tictactoe):
  #   task example:tictactoe          — run entry server.ft (forst run -root …/tictactoe)
  #   task example:tictactoe:generate — forst generate …/tictactoe (generated/*.ts, client/)
  #
  example:
    desc: Compile a specific example file (use task example:tictactoe for merged-package demo)
    dir: forst
    cmds:
      - go run ./{{.BUILD_DIR}} run -loglevel trace -report-phases -- {{.CLI_ARGS}}
    vars:
      CLI_ARGS: '{{.CLI_ARGS | default "../examples/in/basic.ft"}}'

  example:basic:
    desc: Compile basic example
    dir: forst
    cmds:
      - go run ./{{.BUILD_DIR}} run -loglevel trace -report-phases -- {{.EXAMPLES_DIR}}/basic.ft

  example:go-builtins:
    desc: Compile go_builtins example (len/min/max on strings and slices)
    dir: forst
    cmds:
      - go run ./{{.BUILD_DIR}} run -loglevel trace -report-phases -- {{.EXAMPLES_DIR}}/go_builtins.ft

  example:slices:
    desc: Compile slices example (subslice expressions xs[low:high], xs[low:], xs[:high])
    dir: forst
    cmds:
      - go run ./{{.BUILD_DIR}} run -loglevel trace -report-phases -- {{.EXAMPLES_DIR}}/slices.ft

  example:go-interop:
    desc: Compile go_interop example (Go FFI field access, subslices, variadic spread)
    dir: forst
    cmds:
      - go run ./{{.BUILD_DIR}} run -loglevel trace -report-phases -- {{.EXAMPLES_DIR}}/go_interop.ft

  example:generics:
    desc: Compile generics example (built-in []T / *T, append/copy/cap/range; not user-defined type parameters)
    dir: forst
    cmds:
      - go run ./{{.BUILD_DIR}} run -loglevel trace -report-phases -- {{.EXAMPLES_DIR}}/generics.ft

  example:function:
    desc: Compile function example
    dir: forst
    cmds:
      - go run ./{{.BUILD_DIR}} run -loglevel trace -report-phases -- {{.EXAMPLES_DIR}}/basic_function.ft

  example:ensure:
    desc: Compile ensure example
    dir: forst
    cmds:
      - go run ./{{.BUILD_DIR}} run -loglevel trace -report-phases -- {{.EXAMPLES_DIR}}/ensure.ft

  example:nominal-error:
    desc: Compile nominal error example (error X { ... } nominal failure type, RFC 02)
    dir: forst
    cmds:
      - go run ./{{.BUILD_DIR}} run -loglevel trace -report-phases -- {{.EXAMPLES_DIR}}/nominal_error.ft

  example:union-error-types:
    desc: Compile union of nominal errors typedef (ParseError | IoError → Go error / TS union)
    dir: forst
    cmds:
      - go run ./{{.BUILD_DIR}} run -loglevel trace -report-phases -- {{.EXAMPLES_DIR}}/union_error_types.ft

  example:union-error-narrowing:
    desc: Compile union error narrowing example (golden examples/out/union_error_narrowing.go)
    dir: forst
    cmds:
      - go run ./{{.BUILD_DIR}} run -loglevel trace -report-phases -- {{.EXAMPLES_DIR}}/union_error_narrowing.ft

  example:map-catalog:
    desc: Compile map catalog example (golden examples/out/map_catalog.go)
    dir: forst
    cmds:
      - go run ./{{.BUILD_DIR}} run -loglevel trace -report-phases -- {{.EXAMPLES_DIR}}/map_catalog.ft

  example:result-ensure:
    desc: Compile Result + ensure Ok() example (golden examples/out/result_ensure/)
    dir: forst
    cmds:
      - go run ./{{.BUILD_DIR}} run -loglevel trace -report-phases -- {{.EXAMPLES_DIR}}/result_ensure.ft

  example:result-if:
    desc: Compile Result + if x is Ok() example (golden examples/out/result_if/)
    dir: forst
    cmds:
      - go run ./{{.BUILD_DIR}} run -loglevel trace -report-phases -- {{.EXAMPLES_DIR}}/result_if.ft

  example:providers:
    desc: Compile Providers showcase (use/with, golden examples/out/rfc/providers/)
    dir: forst
    cmds:
      - go run ./{{.BUILD_DIR}} build -root {{.EXAMPLES_DIR}}/rfc/providers -loglevel trace -report-phases -- {{.EXAMPLES_DIR}}/rfc/providers/providers.ft

  ensure:providers-gomod:
    internal: true
    dir: forst
    cmds:
      - |
        MOD="{{.EXAMPLES_DIR}}/rfc/providers/go.mod"
        if [ ! -f "$MOD" ]; then
          printf '%s\n\n%s\n' 'module providers_demo' 'go 1.26' > "$MOD"
        fi

  test:providers:
    desc: Run forst test on Providers golden package (providers.ft + providers_test.ft)
    deps: [build, ensure:providers-gomod]
    dir: forst
    cmds:
      - ../bin/{{.BINARY_NAME}} test {{.EXAMPLES_DIR}}/rfc/providers

  test:providers-cross_pkg:
    desc: Run forst test on cross-package Providers cookbook (cross_pkg/auth + cross_pkg/api)
    deps: [build]
    dir: forst
    cmds:
      - ../bin/{{.BINARY_NAME}} test {{.EXAMPLES_DIR}}/rfc/providers/cross_pkg/api

  example:providers-cross_pkg:
    desc: Compile cross-package Providers cookbook (alpha + beta emit)
    dir: forst
    cmds:
      - go run ./{{.BUILD_DIR}} build -root {{.EXAMPLES_DIR}}/rfc/providers/cross_pkg/api -loglevel error -- {{.EXAMPLES_DIR}}/rfc/providers/cross_pkg/api/handle.ft
      - go run ./{{.BUILD_DIR}} build -root {{.EXAMPLES_DIR}}/rfc/providers/cross_pkg/auth -loglevel error -- {{.EXAMPLES_DIR}}/rfc/providers/cross_pkg/auth/log.ft

  test:forst:
    desc: Alias for test:providers (forst test on Providers golden)
    cmds:
      - task: test:providers

  example:requirements:
    desc: Alias for example:providers (legacy task name)
    dir: forst
    cmds:
      - task: example:providers

  example:pointers:
    desc: Compile pointers example
    dir: forst
    cmds:
      - go run ./{{.BUILD_DIR}} run -loglevel trace -report-phases -- {{.EXAMPLES_DIR}}/pointers.ft

  example:shape-guard:
    desc: Compile shape guard example
    dir: forst
    cmds:
      - go run ./{{.BUILD_DIR}} run -loglevel trace -report-phases -- {{.EXAMPLES_DIR}}/rfc/guard/shape_guard.ft

  example:echo:
    desc: Compile echo example
    dir: forst
    cmds:
      - go run ./{{.BUILD_DIR}} run -loglevel trace -report-phases -- {{.EXAMPLES_DIR}}/echo.ft

  examples:update-goldens:
    desc: Regenerate all examples/out Go golden files (after compiler output changes)
    dir: forst
    cmds:
      - UPDATE_EXAMPLES_GOLDENS=1 go test ./cmd/forst -run TestUpdateExamplesGoldens -count=1
      - UPDATE_EXAMPLES_GOLDENS=1 go test ./internal/transformer/go -run TestWriteUnionErrorNarrowingGolden -count=1
      - go test ./cmd/forst -run 'TestExamples$|TestExampleTictactoeMergedPackage|TestExampleProvidersMergedPackage|TestExampleProvidersCrossPkgGolden|TestExampleNodeInteropPackagesCompileGolden' -count=1
      - go test ./internal/compiler -run TestCompileFile_map_catalog_golden -count=1
      - git add -f ../examples/out/

  example:loop:
    desc: Compile for-loop / range example
    dir: forst
    cmds:
      - go run ./{{.BUILD_DIR}} run -loglevel trace -report-phases -- {{.EXAMPLES_DIR}}/loop.ft

  example:imports:
    desc: Run single-file imports example (cli.ft); split fmt_only/greeting/main are for the LSP editor
    dir: forst
    cmds:
      - go run ./{{.BUILD_DIR}} run -loglevel trace -report-phases -- {{.EXAMPLES_DIR}}/imports/cli.ft

  example:tictactoe:
    desc: Run tic-tac-toe demo (merged package under examples/in/tictactoe; entry server.ft)
    dir: forst
    cmds:
      - go run ./{{.BUILD_DIR}} run -root {{.EXAMPLES_DIR}}/tictactoe -- {{.EXAMPLES_DIR}}/tictactoe/server.ft

  example:tictactoe:generate:
    desc: Regenerate generated/ and client/ TypeScript for tictactoe (forst generate on the package dir)
    dir: forst
    cmds:
      - go run ./{{.BUILD_DIR}} generate {{.EXAMPLES_DIR}}/tictactoe

  test:tictactoe:
    desc: Generate TypeScript for tictactoe and run bun integration tests (forst dev + client)
    deps: [build, example:tictactoe:generate]
    cmds:
      - bun install
      - bun test examples/in/tictactoe/tests/

  example:basic-guard:
    desc: Compile basic guard example
    dir: forst
    cmds:
      - go run ./{{.BUILD_DIR}} run -loglevel trace -report-phases -- {{.EXAMPLES_DIR}}/rfc/guard/basic_guard.ft

  example:sidecar-local:
    desc: Run sidecar example using local Forst binary
    dir: examples/in/rfc/sidecar
    deps: [build:sidecar, build]
    cmds:
      - bun run example:local
    silent: false

  example:sidecar-downloaded:
    desc: Run sidecar example (FORST_BINARY defaults to repo bin/forst after task build; unset to exercise @forst/cli download)
    dir: examples/in/rfc/sidecar
    deps: [build:sidecar, build]
    cmds:
      - |
        REPO_BIN="$(cd ../../../.. && pwd)/bin/forst"
        export FORST_BINARY="${FORST_BINARY:-$REPO_BIN}"
        bun run example:downloaded
    silent: false

  example:client:
    desc: Run client example
    dir: examples/in/rfc/sidecar
    deps: [build, build:client, build:sidecar, install:bun]
    cmds:
      - bun run example:client
    silent: false

  test:node-interop:unit:
    desc: Node interop unit tests (nodeinterop, nodert, typechecker, cmd/forst)
    dir: forst
    deps: [build:node-runtime]
    cmds:
      - go test ./internal/nodeinterop/... -count=1
      - go test ./nodert/... -run 'TestCall|TestClient|TestRead|TestManifest|TestFixtures|TestResolve' -count=1 -p 1
      - go test ./internal/typechecker/... -run 'NodeInterop|NodeImports' -count=1
      - go test ./internal/compiler/... -run 'NodeInterop|RequireNoNode|CompileNodeInterop' -count=1
      - go test ./internal/transformer/go/... -run 'NodeBridge|TransformNode' -count=1
      - go test ./cmd/forst/... -run 'NodeInterop' -count=1

  test:node-interop:integration:
    desc: Node interop integration tests (real Node bootstrap via nodert)
    dir: forst
    deps: [build:node-runtime]
    env:
      FORST_NODE_BOOTSTRAP: '{{.ROOT_DIR}}/packages/node-runtime/dist/bootstrap.js'
    cmds:
      - go test ./nodert/... -run 'Integration' -count=1

  test:node-interop:require-no-node:
    desc: Verify -require-no-node allows basic.ft and rejects node-interop
    dir: forst
    cmds:
      - go test ./cmd/forst/... -run 'TestNodeInterop_.*RequireNoNode' -count=1
      - go test ./internal/compiler/... -run 'RequireNoNode' -count=1

  node-interop:smoke:
    desc: Node interop smoke (build node-runtime, Go contracts, Bun tests)
    dir: forst
    deps: [build:node-runtime, build]
    cmds:
      - task: test:node-interop:unit
      - task: test:node-runtime

  example:node-interop:
    desc: Compile node-interop example (Phase 1 compile-only; import node + TS fixture)
    dir: forst
    deps: [build:node-runtime, build]
    cmds:
      - go run ./{{.BUILD_DIR}} build -root {{.EXAMPLES_DIR}}/rfc/node-interop -- {{.EXAMPLES_DIR}}/rfc/node-interop/main.ft

  example:embedded-invoke:
    desc: Compile embedded-invoke example (embedded HTTP /invoke in compiled binary)
    dir: forst
    deps: [build]
    cmds:
      - mkdir -p {{.OUTPUT_DIR}}/rfc/embedded-invoke
      - go run ./{{.BUILD_DIR}} build -export-struct-fields -o {{.OUTPUT_DIR}}/rfc/embedded-invoke/main.go -root {{.EXAMPLES_DIR}}/rfc/embedded-invoke -- {{.EXAMPLES_DIR}}/rfc/embedded-invoke/main.ft

  example:embedded-invoke:run:
    desc: Run embedded-invoke binary and POST /invoke
    dir: forst
    deps: [build, example:embedded-invoke]
    cmds:
      - |
        set -e
        FT_ROOT="{{.EXAMPLES_DIR}}/rfc/embedded-invoke"
        FORST_BOUNDARY_ROOT="$FT_ROOT" ../bin/forst run -export-struct-fields -root "$FT_ROOT" -- "$FT_ROOT/main.ft" &
        PID=$!
        trap 'kill -TERM $PID 2>/dev/null || true' EXIT
        sleep 2
        curl -sf -X POST http://127.0.0.1:8081/invoke \
          -H 'Content-Type: application/json' \
          -d '{"package":"main","function":"Echo","args":[{"message":"hello"}]}'

  example:node-interop-sync:
    desc: Run node-interop sync example (Phase 2 sync RPC E2E)
    dir: forst
    deps: [build:node-runtime, build]
    env:
      FORST_NODE_BOOTSTRAP: '{{.ROOT_DIR}}/packages/node-runtime/dist/bootstrap.js'
    cmds:
      - go run ./{{.BUILD_DIR}} run -export-struct-fields -root {{.EXAMPLES_DIR}}/rfc/node-interop/sync -- {{.EXAMPLES_DIR}}/rfc/node-interop/sync/main.ft

  example:node-interop-promises:
    desc: Run node-interop promises example (Phase 3 async RPC E2E)
    dir: forst
    deps: [build:node-runtime, build]
    env:
      FORST_NODE_BOOTSTRAP: '{{.ROOT_DIR}}/packages/node-runtime/dist/bootstrap.js'
    cmds:
      - go run ./{{.BUILD_DIR}} run -export-struct-fields -root {{.EXAMPLES_DIR}}/rfc/node-interop/promises -- {{.EXAMPLES_DIR}}/rfc/node-interop/promises/main.ft

  example:node-interop-generators:
    desc: Run node-interop generators example (Phase 4 generator RPC E2E)
    dir: forst
    deps: [build:node-runtime, build]
    env:
      FORST_NODE_BOOTSTRAP: '{{.ROOT_DIR}}/packages/node-runtime/dist/bootstrap.js'
    cmds:
      - go run ./{{.BUILD_DIR}} run -export-struct-fields -root {{.EXAMPLES_DIR}}/rfc/node-interop/generators -- {{.EXAMPLES_DIR}}/rfc/node-interop/generators/main.ft

  example:node-interop-async:
    desc: Run node-interop async example (multi-module blocking async + generators E2E)
    dir: forst
    deps: [build:node-runtime, build]
    env:
      FORST_NODE_BOOTSTRAP: '{{.ROOT_DIR}}/packages/node-runtime/dist/bootstrap.js'
    cmds:
      - go run ./{{.BUILD_DIR}} run -export-struct-fields -root {{.EXAMPLES_DIR}}/rfc/node-interop/async -- {{.EXAMPLES_DIR}}/rfc/node-interop/async/main.ft

  example:node-interop-host:
    desc: Compile node-interop host example (host mode fixture; compile-only)
    dir: forst
    deps: [build:node-runtime, build]
    cmds:
      - go run ./{{.BUILD_DIR}} build -export-struct-fields -root {{.EXAMPLES_DIR}}/rfc/node-interop/host -- {{.EXAMPLES_DIR}}/rfc/node-interop/host/main.ft

  example:node-interop-remix-serve:install:
    desc: Install remix-serve example Node deps
    dir: examples/in/rfc/node-interop/remix-serve
    cmds:
      - bun install

  example:node-interop-remix-serve:generate:
    desc: Generate TypeScript client for remix-serve example
    dir: forst
    deps: [build]
    cmds:
      - go run ./{{.BUILD_DIR}} generate {{.EXAMPLES_DIR}}/rfc/node-interop/remix-serve

  example:node-interop-remix-serve:build-remix:
    desc: Build Remix app for remix-serve example (remix vite:build)
    dir: examples/in/rfc/node-interop/remix-serve
    deps: [build:client, build:sidecar, example:node-interop-remix-serve:generate]
    cmds:
      - task: example:node-interop-remix-serve:install
      - bun run build

  example:node-interop-remix-serve:
    desc: Compile node-interop remix-serve example (host mode + remix-serve + embedded invoke)
    dir: forst
    deps: [build:node-runtime, build, example:node-interop-remix-serve:build-remix]
    cmds:
      - go run ./{{.BUILD_DIR}} build -export-struct-fields -root {{.EXAMPLES_DIR}}/rfc/node-interop/remix-serve -- {{.EXAMPLES_DIR}}/rfc/node-interop/remix-serve/main.ft

  example:node-interop-remix-serve:run:
    desc: Run remix-serve todo example (three-channel IPC; blocks on invoke server)
    dir: forst
    deps: [build:node-runtime, build, example:node-interop-remix-serve:build-remix]
    env:
      HOST: '127.0.0.1'
    cmds:
      - go run ./{{.BUILD_DIR}} run -export-struct-fields -root {{.EXAMPLES_DIR}}/rfc/node-interop/remix-serve -- {{.EXAMPLES_DIR}}/rfc/node-interop/remix-serve/main.ft

  example:node-interop-remix-serve:e2e:
    desc: E2E — invoke :8081, Remix :3000, generated client
    dir: forst
    deps: [build:node-runtime, build, example:node-interop-remix-serve:build-remix]
    env:
      HOST: '127.0.0.1'
    cmds:
      - |
        FT_ROOT="{{.EXAMPLES_DIR}}/rfc/node-interop/remix-serve"
        FORST_BIN="../bin/{{.BINARY_NAME}}"
        export FT_ROOT FORST_BIN
        bash -eo pipefail <<'EOS'
        lsof -ti tcp:8081 2>/dev/null | xargs kill -9 2>/dev/null || true
        lsof -ti tcp:3000 2>/dev/null | xargs kill -9 2>/dev/null || true
        pkill -f 'forst run.*node-interop/remix-serve' 2>/dev/null || true
        pkill -f 'remix-serve build/server/index.js' 2>/dev/null || true
        sleep 0.3

        FORST_BOUNDARY_ROOT="$FT_ROOT" "$FORST_BIN" run \
          -export-struct-fields -root "$FT_ROOT" -- "$FT_ROOT/main.ft" &
        FORST_PID=$!
        cleanup() {
          kill -TERM "$FORST_PID" 2>/dev/null || true
          wait "$FORST_PID" 2>/dev/null || true
        }
        trap cleanup EXIT
        trap cleanup INT
        trap cleanup TERM

        bash ../scripts/wait-for-url.sh http://127.0.0.1:8081/health "invoke :8081" 120
        bash ../scripts/wait-for-url.sh http://127.0.0.1:3000/ "remix :3000" 120

        curl -sf http://127.0.0.1:3000/ | grep -q 'Todos'
        cd "$FT_ROOT" && FORST_BASE_URL=http://127.0.0.1:8081 bun test e2e/
        EOS

  example:node-interop-modules:
    desc: Run node-interop modules example (nested TS module resolution E2E)
    dir: forst
    deps: [build:node-runtime, build]
    env:
      FORST_NODE_BOOTSTRAP: '{{.ROOT_DIR}}/packages/node-runtime/dist/bootstrap.js'
    cmds:
      - go run ./{{.BUILD_DIR}} run -export-struct-fields -root {{.EXAMPLES_DIR}}/rfc/node-interop/modules -- {{.EXAMPLES_DIR}}/rfc/node-interop/modules/main.ft

  dump:
    desc: Dump debug info for a specific example file
    dir: forst
    cmds:
      - go run ./{{.BUILD_DIR}} dump --file={{.ROOT_DIR}}/{{.FILE}} -format={{.FORMAT}} --phase={{.PHASE}} --summary={{.SUMMARY}}
    vars:
      FILE: '{{.FILE | default "examples/in/basic.ft"}}'
      FORMAT: '{{.FORMAT | default "json"}}'
      PHASE: '{{.PHASE | default "all"}}'
      SUMMARY: '{{.SUMMARY | default "false"}}'

  # Development tasks
  dev:watch:
    desc: Watch for changes and run tests
    cmds:
      - watchexec -r "task test"

  dev:lint:
    desc: Run linters
    dir: forst
    cmds:
      - golangci-lint run ./...

  dev:format:
    desc: Format code
    dir: forst
    cmds:
      - go fmt ./...

  dev:vet:
    desc: Run go vet
    dir: forst
    cmds:
      - go vet ./...

  fix:check:
    desc: Verify go fix modernizers produce no diff (Go 1.26)
    dir: forst
    cmds:
      - go fix -diff ./...

  profile:forst:
    desc: Generate forst/default.pgo for release builds (re-run when typechecker/parser hot paths change)
    dir: forst
    cmds:
      - |
        set -euo pipefail
        profiles=()
        while IFS= read -r pkg; do
          prof="$(mktemp -t forst-pgo-XXXX.pgo)"
          profiles+=("$prof")
          go test -bench=NONE -count=1 -timeout=30m -cpuprofile="$prof" "$pkg"
        done < <(go list ./internal/typechecker/... ./internal/parser/... ./internal/transformer/... ./cmd/forst/...)
        go tool pprof -proto -output=default.pgo "${profiles[@]}"
        rm -f "${profiles[@]}"

  # Documentation tasks
  docs:generate:
    desc: Generate documentation
    dir: forst
    cmds:
      - godoc -http=:6060

  # CI/CD tasks
  check:coverage:
    desc: Fail if merged statement coverage is below MIN_COVERAGE (default 72); uses profile.cov from last go test or runs tests
    dir: forst
    vars:
      MIN_COVERAGE: '{{.MIN_COVERAGE | default "72"}}'
    cmds:
      - |
        test -f profile.cov || go test -coverprofile=profile.cov ./cmd/forst/... ./internal/... -count=1
      - bash scripts/check_coverage_threshold.sh profile.cov {{.MIN_COVERAGE}}

  ci:test:
    desc: Run CI lint suite
    dir: forst
    set: [errexit]
    cmds:
      - task: build:vscode
      - go test -race -covermode atomic -coverprofile=profile.cov -timeout=10m ./cmd/forst/... ./internal/...
      - task: test:cli
      - task: test:sidecar
      - task: node-interop:smoke
      - task: test:node-interop:require-no-node
      - task: example:node-interop
      - task: example:node-interop-sync
      - task: example:node-interop-promises
      - task: example:node-interop-generators
      - task: example:node-interop-async
      - task: example:node-interop-host
      - task: example:node-interop-remix-serve
      - task: example:node-interop-modules
      - task example:sidecar-local
      - task example:sidecar-downloaded
      - task test:tictactoe
      - task test:providers
      - task test:providers-cross_pkg
      - task example:providers
      - task example:providers-cross_pkg

  # Release tasks
  build:release:
    desc: Build release binaries for multiple platforms
    dir: forst
    cmds:
      - mkdir -p ../dist
      - |
        set -euo pipefail
        PGO_FLAG=""
        if [ -f default.pgo ]; then PGO_FLAG="-pgo=default.pgo"; fi
        VERSION="{{.VERSION | default "dev"}}"
        COMMIT="{{.COMMIT | default "unknown"}}"
        DATE="{{.DATE | default "unknown"}}"
        LDFLAGS="-s -w -X main.Version=${VERSION} -X main.Commit=${COMMIT} -X main.Date=${DATE}"
        BINARY="{{.BINARY_NAME}}"
        BUILD_DIR="{{.BUILD_DIR}}"
        GOOS=linux GOARCH=amd64 go build ${PGO_FLAG} -ldflags="${LDFLAGS}" -o ../dist/${BINARY}-linux-amd64 ./${BUILD_DIR}
        GOOS=linux GOARCH=arm64 go build ${PGO_FLAG} -ldflags="${LDFLAGS}" -o ../dist/${BINARY}-linux-arm64 ./${BUILD_DIR}
        GOOS=darwin GOARCH=amd64 go build ${PGO_FLAG} -ldflags="${LDFLAGS}" -o ../dist/${BINARY}-darwin-amd64 ./${BUILD_DIR}
        GOOS=darwin GOARCH=arm64 go build ${PGO_FLAG} -ldflags="${LDFLAGS}" -o ../dist/${BINARY}-darwin-arm64 ./${BUILD_DIR}
        GOOS=windows GOARCH=amd64 go build ${PGO_FLAG} -ldflags="${LDFLAGS}" -o ../dist/${BINARY}-windows-amd64.exe ./${BUILD_DIR}
        GOOS=windows GOARCH=arm64 go build ${PGO_FLAG} -ldflags="${LDFLAGS}" -o ../dist/${BINARY}-windows-arm64.exe ./${BUILD_DIR}
      - tar -czf ../dist/{{.BINARY_NAME}}-linux-amd64.tar.gz -C ../dist {{.BINARY_NAME}}-linux-amd64
      - tar -czf ../dist/{{.BINARY_NAME}}-linux-arm64.tar.gz -C ../dist {{.BINARY_NAME}}-linux-arm64
      - tar -czf ../dist/{{.BINARY_NAME}}-darwin-amd64.tar.gz -C ../dist {{.BINARY_NAME}}-darwin-amd64
      - tar -czf ../dist/{{.BINARY_NAME}}-darwin-arm64.tar.gz -C ../dist {{.BINARY_NAME}}-darwin-arm64
      - cd ../dist && zip {{.BINARY_NAME}}-windows-amd64.zip {{.BINARY_NAME}}-windows-amd64.exe
      - cd ../dist && zip {{.BINARY_NAME}}-windows-arm64.zip {{.BINARY_NAME}}-windows-arm64.exe
    generates:
      - ../dist/*.tar.gz
      - ../dist/*.zip

  build:vsix:
    desc: |
      Production .vsix: rewrite @forst/cli, bun install, materialize @forst/cli for compile, compile, then
      package-vsix-from-stage (vsce from a temp dir so npm list does not include the monorepo root).
      Restores package.json and bun.lockb after. Depends on build:cli for packages/cli/dist.
    dir: packages/vscode-forst
    deps: [install:bun, build:cli]
    cmds:
      - |
        set -euo pipefail
        cleanup() {
          git checkout -- package.json ../../bun.lockb
        }
        trap cleanup EXIT
        node ../sidecar/scripts/rewrite-cli-workspace-dep-for-publish.mjs package.json
        bun install
        node ./scripts/materialize-cli-dep-for-vsix.mjs
        mkdir -p ../../dist
        bun run compile
        node ./scripts/package-vsix-from-stage.mjs ../../dist/forst-vscode-{{.VERSION | default "dev"}}.vsix

  release:check:
    desc: Check release configuration
    dir: forst
    cmds:
      - echo "Release configuration checked"
      - echo "Using Release Please for automated releases"

  release:please:
    desc: Run Release Please locally
    dir: forst
    cmds:
      - npx release-please manifest
      - echo "Release Please manifest generated"
      - echo "Use 'npx release-please create-pr' to create a release PR"
      - echo "Use 'npx release-please github-release' to create a GitHub release"

  release:test:
    desc: Test build with sample version info
    dir: forst
    cmds:
      - task build:release VERSION=1.0.0-test COMMIT=test-commit DATE=2024-01-01T00:00:00Z
      - echo "Test build completed with version info"

  docker:build:
    desc: Build local Docker images (default with Go, and minimal side image)
    cmds:
      - |
        docker build -f docker/Dockerfile -t forst-local:default \
          --build-arg VERSION=dev --build-arg COMMIT=local --build-arg DATE=unknown .
      - |
        docker build -f docker/Dockerfile --target minimal -t forst-local:minimal \
          --build-arg VERSION=dev --build-arg COMMIT=local --build-arg DATE=unknown .

  docker:smoke:
    desc: Smoke test local Docker images
    deps: [docker:build]
    cmds:
      - docker run --rm forst-local:default version
      - |
        docker run --rm \
          -v "{{.TASKFILE_DIR}}/examples/in:/workspace" \
          -w /workspace \
          forst-local:default run basic.ft
      - docker run --rm forst-local:minimal version

  install:bun:
    desc: Install bun dependencies
    cmds:
      - bun install
    run: once
